<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>ToDoList|JS Mastery</title>
</head>
<body>
<div class="wrapper">
    <div class="wrapper-inner">
        <div class="heading">
            <h1>
                Moje úkoly
            </h1>

            <h4>hotovo</h4>
        </div>
        <div class="postup">
            <div class="postup-inner">
                <h6>
                    postup
                </h6>
                <h6>
                    %
                </h6>
            </div>
            <div class="line"></div>
        </div>
        <div class="menu">
            <!-- dodelat psani -->

            <div class="menu-wrapper">
                <div class="buttons">
                     <button>
                    Vysoká
                </button>
                <button>
                    Střední
                </button>
                <button>
                    Nízká
                </button>
                </div>
               <div class="buttons">
                <button>
                    Přidat
                </button>
               </div>
            </div>

        </div>
        <div class="filtry">
            <div class="buttons-row">
                <button>
                    Vše
                </button>
                <button>
                    Vysoká
                </button>
                <button>
                    Střední
                </button>
                <button>
                    Nízká
                </button>
            </div>
        </div>
        <div class="object">
            <div class="vertikal"></div>
            
            <div class="checkbox">
                <div class="square"></div>
            </div>
            <div class="object-body">
                
                    <h4>Odevzdat</h4>
                    
                    <h6>date <time datetime=""></time></h6>
                
                <div class="priority">
                    <!-- dodelat priority -->
                </div>
                <div class="delete">
                    <!-- dodelat pomocí knihovny -->
                </div>
            </div>
        </div>
    </div>
</div>
   
<script src="index.js"></script>
</body>
</html>
