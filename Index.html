<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <title>ToDoList|JS Mastery</title>
</head>
<body>
<div class="wrapper">
    <div class="wrapper-inner">
        <div class="heading">
            <h1>
                Moje úkoly
            </h1>

            <h4>hotovo</h4>
        </div>
        <div class="postup">
            <h6>
                postup
            </h6>
            <h6>
                %
            </h6>
        </div>
        <div class="menu">
            <!-- dodelat psani -->

            <div class="menu-wrapper">
                <div class="buttons">
                     <button>
                    Vysoká
                </button>
                <button>
                    Střední
                </button>
                <button>
                    Nízká
                </button>
                </div>
               <div class="buttons">
                <button>
                    Přidat
                </button>
               </div>
            </div>

        </div>
        <div class="filtry">
            <div class="buttons-row">
                <button>
                    Vše
                </button>
                <button>
                    Vysoká
                </button>
                <button>
                    Střední
                </button>
                <button>
                    Nízká
                </button>
            </div>
        </div>
        <div class="object">
            <span>
                |
            </span>
            <div class="checkbox">
                <!-- udělat čtverec -->
            </div>
            <div class="napis">
                <h4>tittle</h4>
                <h6>datum</h6>
            </div>
            <div class="priority">
                <!-- dodelat priority -->
            </div>
            <div class="delete">
                <!-- dodelat pomocí knihovny -->
            </div>
        </div>
    </div>
</div>
   
<script src="index.js"></script>
</body>
</html>
